<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Ares Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #0f0f1b;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }

        .contenedor-radio {
            position: relative;
            width: 400px; /* Ajustado al tamaño de la imagen */
            height: 600px;
            background: url('fondo_radio.png') no-repeat center center;
            background-size: contain;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Reproductor Invisible sobre el diseño */
        .reproductor-layer {
            position: absolute;
            top: 70%; /* Posicionado sobre la barra de la imagen */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            opacity: 0.5; /* Lo hacemos semi-invisible para que se vea el diseño de abajo */
        }
        
        audio {
            width: 100%;
            height: 45px;
            filter: invert(100%);
        }

        /* Contenedor de Redes Sociales debajo del Live */
        .redes-capa {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .redes-capa a {
            color: white;
            font-size: 1.2rem;
            text-decoration: none;
            transition: 0.3s;
            opacity: 0.8;
        }

        .redes-capa a:hover {
            transform: scale(1.2);
            opacity: 1;
            color: #00d4ff;
        }

        /* Enlace a la web de Wix (el texto pequeño de abajo) */
        .link-wix {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="contenedor-radio">
        
        <div class="reproductor-layer">
            <audio controls>
                <source src="https://stream-174.zeno.fm/laazclydfopvv" type="audio/mpeg">
            </audio>
        </div>
